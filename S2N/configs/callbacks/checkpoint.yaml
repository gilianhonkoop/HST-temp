model_checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  dirpath: "./checkpoints/"  # parent path is hydra.dir
  filename: "epoch_{epoch:03d}"
  monitor: "valid/illicit_pr_auc"
  mode: "max" # can be "max" or "min"
  save_top_k: 1 # save k best models (determined by above metric)
  save_last: False
  verbose: True
  auto_insert_metric_name: True

early_stopping:
  _target_: pytorch_lightning.callbacks.EarlyStopping
  monitor: # Lazy loading, name of the logged metric which determines when model is improving
  mode: "max" # can be "max" or "min"
  patience: 50 # how many epochs of not improving until training stops
  min_delta: 0 # minimum change in the monitored metric needed to qualify as an improvement