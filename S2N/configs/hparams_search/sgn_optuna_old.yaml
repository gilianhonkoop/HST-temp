# @package _global_

defaults:
  - tpe.yaml

objective: "valid/illicit_pr_auc"

threshold_search:
  enabled: True
  metric: illicit_f1
  n_trials: 30
  lower: 0.1
  upper: 0.95

hydra:
  sweeper:
    direction: maximize
    # storage: sqlite:///optuna_sweep.db
    storage: null
    n_trials: 30
    n_jobs: 1
    params:
      model.hidden_channels: "choice(64, 128, 256)"
      model.learning_rate: "tag(log, float(0.0005, 0.01))"
      model.dropout_channels: "float(0.0, 0.5)"
      model.dropout_edges: "float(0.0, 0.5)"
      model.weight_decay: "float(1e-9, 1e-6)"
      model.num_layers: "int(1, 2)"
      # model.layer_kwargs.alpha: "float(0.1, 0.9)"
      # model.layer_kwargs.theta: "float(0.1, 2.0)"
      model.loss_weight_0: "int(5, 30)"
      datamodule.batch_size: "choice(128, 256, 512, 1024)"