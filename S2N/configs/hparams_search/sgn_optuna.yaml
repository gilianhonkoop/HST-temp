# @package _global_

defaults:
  - tpe.yaml

objective: "valid/illicit_pr_auc"

threshold_search:
  enabled: True
  metric: illicit_f1
  n_trials: 40
  lower: 0.05
  upper: 0.95

hydra:
  sweeper:
    direction: maximize
    # storage: sqlite:///optuna_sweep.db
    storage: null
    n_trials: 25
    n_jobs: 1
    params:
      model.hidden_channels: "choice(256)"
      model.learning_rate: "tag(log, float(1e-4, 2e-3))"
      model.dropout_channels: "float(0.0, 0.4)"
      model.dropout_edges: "float(0.0, 0.4)"
      model.weight_decay: "tag(log, float(1e-5, 1e-3))"
      model.num_layers: "int(3)"
      # model.layer_kwargs.alpha: "float(0.1, 0.9)"
      # model.layer_kwargs.theta: "float(0.1, 2.0)"
      model.loss_weight_0: "int(10, 25)"
      datamodule.batch_size: "choice(128)"
