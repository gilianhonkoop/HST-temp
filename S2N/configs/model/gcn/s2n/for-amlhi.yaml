_target_: model.GraphNeuralModel
defaults:
  - common_model.yaml

encoder_layer_name: GCNConv
num_layers: 3
use_bn: true
use_skip: true
dropout_channels: 0.0
dropout_edges: 0.4
learning_rate: 0.002
weight_decay: 0.001
_gradient_clip_val: 0.1
sub_node_num_layers: 0
sub_node_encoder_aggr: sum
sub_node_encoder_layer_kwargs:
  heads: 8
  eps: null
  alpha: null
  theta: null
  shared_weights: null
subname: GCN-S2N
hidden_channels: 256

metrics: [ "binary_f1", "roc_auc", "pr_auc" ]

layer_kwargs:
  normalize: true
  add_self_loops: true
loss_weight_0: 10
loss_weight:
  - ${model.loss_weight_0}
  - 1.0
