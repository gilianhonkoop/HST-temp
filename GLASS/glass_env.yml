      - https://data.pyg.org/whl/torch-1.9.0%2Bcu111/torch_sparse-0.6.12-cp39-cp39-linux_x86_64.whl
      - https://data.pyg.org/whl/torch-1.9.0%2Bcu111/torch_cluster-1.5.9-cp39-cp39-linux_x86_64.whl
      - https://data.pyg.org/whl/torch-1.9.0%2Bcu111/torch_spline_conv-1.2.1-cp39-cp39-linux_x86_64.whl
      - torch-geometric==1.7.2