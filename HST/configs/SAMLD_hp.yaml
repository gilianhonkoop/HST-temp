defaults:
  - saml-d/saml-d-1
  - _self_
  - override hydra/sweeper: optuna
  - override hydra/launcher: joblib

objective: "val/illicit_pr_auc"
study_name: "SAML_D_light_hp"
top_k_wandb_runs: 3

logging:
  run_name: "SAML-D-light-hp"

hydra:
  run:
    dir: ${oc.env:TMPDIR,/tmp}/hst_hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${oc.env:TMPDIR,/tmp}/hst_hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  output_subdir: null
  job:
    chdir: false
  sweeper:
    direction: maximize
    storage: "sqlite:///SAML_D_light_hp.db"
    n_trials: 20
    n_jobs: 1
    params:
      optim.base_lr: "tag(log, float(5e-5, 1e-3))"
      optim.aggregator_lr: "tag(log, float(5e-6, 1e-4))"
      model.dropout: "float(0.25, 0.5)"
      train.pos_weight: "tag(log, float(0.05, 1.0))"
