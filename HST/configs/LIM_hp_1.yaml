defaults:
  - aml/optuna/LIM-1
  - _self_
  - override hydra/sweeper: optuna
  - override hydra/launcher: joblib

objective: "val/illicit_pr_auc"
study_name: "LIM_hp_1"
top_k_wandb_runs: 3

hydra:
  run:
    dir: ${oc.env:TMPDIR,/tmp}/hst_hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${oc.env:TMPDIR,/tmp}/hst_hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  output_subdir: null
  job:
    chdir: false
  sweeper:
    direction: maximize
    storage: "sqlite:///LIM_hp_1.db"
    n_trials: 10
    n_jobs: 1
    params:
      optim.base_lr: "tag(log, float(5e-5, 1e-3))"
      optim.aggregator_lr: "tag(log, float(1e-5, 1e-4))"
      optim.weight_decay: "tag(log, float(1e-5, 1e-3))"
      model.dropout: "float(0.25, 0.5)"
      train.pos_weight: "float(0.025, 0.75)"
