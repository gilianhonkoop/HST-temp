dataset:
  data_path: "/home/ghonkoop/data"
  dataset_name: "HI-Small"
  dataset_type: "aml"
  embedding_type: None
  train_ratio: 0.6
  val_ratio: 0.2
  illicit_label: 0

aggregators:
  hidden_dim: 256
  node_pooling_mode: "fraudgt"
  edge_pooling_mode: "attention-stats"
  fraudgt:
    heads: 4

model:
  hidden_dim: 256
  dropout: 0.1900301661996034
  pearl:
    num_phi_layers: 4
    num_samples: 32
    sample_pool: "mean"
    random_std: 1.0
  fraudgt:
    heads: 4

train:
  device: "cuda"
  num_workers: 11
  num_threads: 1
  persistent_workers: True
  pin_memory: True
  disjoint: True
  seed: 42
  use_amp: True
  mini_batch: True
  batch_size: 1024
  neighbor_sizes: [50, 50]
  training_threshold: 0.7365965955600305
  summarize_once_per_epoch: True
  iter_per_epoch: 32
  eval_period: 1
  pos_weight: 0.12062962595328858

threshold_search:
  enabled: True
  metric: val/illicit_f1
  n_trials: 50
  lower: 0.01
  upper: 0.99

optim:
  optimizer: adamW
  weight_decay: 0.0005105064312544539
  base_lr: 0.001129472239366768
  max_epoch: 120
  patience: 25
  clip_grad_norm: True
  max_grad_norm: 1.0

logging:
  log_interval: 5
  use_wandb: True
  wandb_project: "HST"
  use_checkpoints: True
  ckpt_period: 20
  save_dir: "/scratch-shared/ghonkoop/checkpoints/aml/hi-small"
  run_name: "aml-HIS-7"
  monitor_metric: "val/illicit_pr_auc"
  monitor_mode: "max"
