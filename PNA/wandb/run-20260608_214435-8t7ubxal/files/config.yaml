dataset:
    value:
        add_degree_feature: true
        add_reverse_edges: false
        data_path: /home/ghonkoop/data
        dataset_name: LI-Small
        dataset_type: aml
        edge_feature_clip: 10
        edge_feature_norm_eps: 1e-06
        edge_feature_normalize: zscore
        illicit_label: 0
        max_degree_hist: 1000
        node_features: raw
        split_mode: class_temporal
        train_ratio: 0.6
        use_cache: true
        use_edge_features: true
        val_ratio: 0.2
logging:
    value:
        monitor_metric: val/illicit_pr_auc
        monitor_mode: max
        run_name: PNA_LIS-3
        save_dir: outputs
        use_wandb: true
        wandb_entity: hierarchical-subgraph-transformer
        wandb_project: PNA
model:
    value:
        aggregators:
            - mean
            - min
            - max
            - std
        dropout: 0.35
        hidden_dim: 256
        num_layers: 3
        post_layers: 1
        pre_layers: 1
        readout: mean_sum_max
        scalers:
            - identity
            - amplification
            - attenuation
        towers: 2
optim:
    value:
        base_lr: 0.0005382726333060602
        clip_grad_norm: true
        lr_scheduler:
            enabled: true
            factor: 0.7
            min_lr: 1e-06
            mode: max
            patience: 6
            type: plateau
        max_epoch: 150
        max_grad_norm: 5
        min_epoch: 60
        optimizer: adamw
        patience: 20
        weight_decay: 0.00028758768289232825
threshold_search:
    value:
        enabled: true
        lower: 0.05
        metric: illicit_f1
        n_trials: 40
        upper: 0.95
train:
    value:
        batch_size: 256
        device: cuda
        eval_batch_size: 512
        eval_period: 1
        num_workers: 4
        persistent_workers: true
        pin_memory: true
        pos_weight: null
        seed: 42
        training_threshold: 0.5
